<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabSnap Settings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 300px;
      font-family: 'Courier New', monospace;
      background: #1a1a1a;
      color: #ffffff;
      padding: 20px;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 16px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .section {
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 12px;
      color: #888;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .strategy-option {
      display: flex;
      align-items: flex-start;
      margin-bottom: 12px;
      cursor: pointer;
      padding: 8px;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .strategy-option:hover {
      background: #2a2a2a;
    }

    .strategy-option input[type="radio"] {
      margin-right: 10px;
      margin-top: 2px;
      cursor: pointer;
    }

    .strategy-label {
      flex: 1;
    }

    .strategy-name {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .strategy-description {
      font-size: 11px;
      color: #aaa;
      line-height: 1.4;
    }

    .stats {
      background: #2a2a2a;
      padding: 12px;
      border-radius: 4px;
      font-size: 12px;
      text-align: center;
    }

    .stats-value {
      font-size: 24px;
      font-weight: bold;
      color: #4CAF50;
      margin-bottom: 4px;
    }

    .stats-label {
      color: #888;
      font-size: 11px;
    }

    .footer {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #333;
      font-size: 10px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>⚡ TabSnap</h1>

  <div class="section">
    <div class="section-title">Focus Strategy</div>

    <label class="strategy-option">
      <input type="radio" name="strategy" value="proximity">
      <div class="strategy-label">
        <div class="strategy-name">Proximity</div>
        <div class="strategy-description">Focus the tab with the closest index</div>
      </div>
    </label>

    <label class="strategy-option">
      <input type="radio" name="strategy" value="lru">
      <div class="strategy-label">
        <div class="strategy-name">LRU</div>
        <div class="strategy-description">Focus the most recently used tab</div>
      </div>
    </label>

    <label class="strategy-option">
      <input type="radio" name="strategy" value="hybrid">
      <div class="strategy-label">
        <div class="strategy-name">Hybrid</div>
        <div class="strategy-description">Proximity, but fall back to LRU if closest tab is stale (>5min)</div>
      </div>
    </label>
  </div>

  <div class="section">
    <div class="stats">
      <div class="stats-value" id="redirect-count">0</div>
      <div class="stats-label">tabs redirected</div>
    </div>
  </div>

  <div class="footer">
    TabSnap v1.0.0
  </div>

  <script src="popup.js"></script>
</body>
</html>
